name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      # packages/engine builds first — web and functions both depend on its compiled dist/.
      - run: npm run build -w packages/engine
      - run: npm run test -w packages/engine

      - run: npm run test -w web
      - run: npm run build -w web

      - run: npm run build -w functions

      # functions/ and firestore-tests/ both need a live Firestore emulator (transactions,
      # security-rules evaluation) — run together against one emulator instance.
      - run: >
          npx firebase-tools emulators:exec --project mikeadair-catan --only firestore
          "npm run test -w functions && npm run test -w firestore-tests"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: web/dist

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: web/dist

      # Deployed first: the hosting bundle below calls submitAction/startGame directly, so
      # the callables must exist before the new client can reach them. firebase.json's
      # predeploy hooks build packages/engine and functions/ themselves.
      - name: Deploy Cloud Functions
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/gcp-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
          npx firebase-tools deploy --only functions --project mikeadair-catan --non-interactive
          rm -f /tmp/gcp-key.json

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: mikeadair-catan
          channelId: live

      - name: Deploy Firestore rules & indexes
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/gcp-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
          npx firebase-tools deploy --only firestore:rules,firestore:indexes --project mikeadair-catan --non-interactive
          rm -f /tmp/gcp-key.json

  # Regenerates web/e2e/screenshots/*.png (home, lobby, setup, mid-game) and commits them
  # back to main. Deliberately NOT a dependency of `deploy` (and vice versa) — e2e/Firestore
  # timing can be flaky, and a flaky screenshot run should never block a real deploy. Runs
  # against the Firebase Local Emulator Suite (see web/src/firebase/config.ts), not the live
  # mikeadair-catan project, so this never touches production data.
  capture-screenshots:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium
        working-directory: web

      # No args — `npm run test:e2e`'s `firebase emulators:exec ... "playwright test"` swallows
      # anything appended after `--` into the *outer* emulators:exec command, not the quoted
      # inner playwright command, so `-- layout.spec.ts` silently does nothing. Harmless today
      # (layout.spec.ts is the only spec file), but don't rely on it if a second file is added.
      - run: npm run test:e2e
        working-directory: web

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate e2e screenshots [skip ci]"
          file_pattern: web/e2e/screenshots/*.png
